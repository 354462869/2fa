services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: 2fa-server:dev
    container_name: 2fa-server
    restart: unless-stopped
    environment:
      SERVER_ADDR: "0.0.0.0:8080"
      SERVER_ENV: "development"
      SERVER_DB_PATH: "/data/2fa.sqlite"
      SERVER_PUBLIC_ORIGIN: "http://127.0.0.1:8080"
      SERVER_SESSION_TTL: "720h"
      SERVER_ALLOWED_ORIGINS: "http://127.0.0.1:5173"
      SERVER_RATE_LIMIT_AUTH_PER_MIN: "20"
      SERVER_RATE_LIMIT_SYNC_PER_MIN: "600"
    volumes:
      - server-data:/data
    ports:
      - "127.0.0.1:8080:8080"

volumes:
  server-data:
