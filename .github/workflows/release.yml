name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @2fa/api-types build
          pnpm --filter @2fa/api-client build

      - name: Build extension
        run: pnpm --filter @2fa/extension build

      - name: Build admin
        run: pnpm --filter @2fa/admin build

      - name: Package extension
        run: |
          cd apps/extension/dist
          zip -r "${GITHUB_WORKSPACE}/2fa-extension-${RELEASE_TAG}.zip" .

      - name: Package source archive
        run: |
          git archive --format=tar.gz --prefix="2fa-${RELEASE_TAG}/" \
            -o "${GITHUB_WORKSPACE}/2fa-source-${RELEASE_TAG}.tar.gz" "${RELEASE_TAG}"

      - name: Extract release notes
        run: |
          awk -v tag="${RELEASE_TAG}" '
            $0 == "# " tag { emit = 1; next }
            emit && /^# v[0-9]+\.[0-9]+\.[0-9]+/ { exit }
            emit { print }
          ' RELEASE_NOTES.md > "${GITHUB_WORKSPACE}/release-notes-${RELEASE_TAG}.md"
          test -s "${GITHUB_WORKSPACE}/release-notes-${RELEASE_TAG}.md"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/354462869/2fa-server:${{ env.RELEASE_TAG }}
            ghcr.io/354462869/2fa-server:latest

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes-${{ env.RELEASE_TAG }}.md
          files: |
            2fa-extension-${{ env.RELEASE_TAG }}.zip
            2fa-source-${{ env.RELEASE_TAG }}.tar.gz
