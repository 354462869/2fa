name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.2.3'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chrome for extension E2E
        run: pnpm --filter @2fa/extension exec playwright install --with-deps chrome

      - name: Run release quality gates
        run: |
          make test
          make build
          make typecheck
          make vet
          git diff --check

      - name: Package extension
        run: |
          cd apps/extension/dist
          zip -r "${GITHUB_WORKSPACE}/2fa-extension-${RELEASE_TAG}.zip" .

      - name: Package source archive
        run: |
          git archive --format=tar.gz --prefix="2fa-${RELEASE_TAG}/" \
            -o "${GITHUB_WORKSPACE}/2fa-source-${RELEASE_TAG}.tar.gz" "${RELEASE_TAG}"

      - name: Extract release notes
        run: |
          awk -v tag="${RELEASE_TAG}" '
            $0 == "# " tag { emit = 1; next }
            emit && /^# v[0-9]+\.[0-9]+\.[0-9]+/ { exit }
            emit { print }
          ' RELEASE_NOTES.md > "${GITHUB_WORKSPACE}/release-notes-${RELEASE_TAG}.md"
          test -s "${GITHUB_WORKSPACE}/release-notes-${RELEASE_TAG}.md"

      - name: Build Docker smoke image
        run: docker build -f deploy/Dockerfile -t 2fa-server:release-smoke .

      - name: Smoke test Docker persistence and embedded admin
        run: |
          set -euo pipefail
          container="2fa-release-smoke-${GITHUB_RUN_ID}"
          volume="2fa-release-smoke-${GITHUB_RUN_ID}"
          cleanup() {
            docker rm -f "${container}" >/dev/null 2>&1 || true
            docker volume rm "${volume}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker volume create "${volume}" >/dev/null

          start_container() {
            docker run -d --name "${container}" \
              -p 127.0.0.1:18080:8080 \
              -e SERVER_SESSION_SECRET=release-smoke-session-secret \
              -v "${volume}:/data" \
              2fa-server:release-smoke >/dev/null
          }
          wait_for_health() {
            for attempt in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:18080/v1/meta/health >/dev/null; then
                return 0
              fi
              sleep 1
            done
            docker logs "${container}"
            return 1
          }

          start_container
          wait_for_health
          curl -fsS http://127.0.0.1:18080/v1/meta/version | grep -q '"version":"0.2.3"'
          curl -fsS http://127.0.0.1:18080/ >/dev/null
          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data '{"username":"release-admin","password":"ReleaseSmokePassword123!"}' \
            http://127.0.0.1:18080/v1/admin/setup >/dev/null
          docker logs "${container}" > /tmp/2fa-release-smoke-first.log
          docker stop "${container}" >/dev/null
          docker rm "${container}" >/dev/null

          start_container
          wait_for_health
          curl -fsS http://127.0.0.1:18080/v1/admin/setup/status | grep -q '"needs_setup":false'
          docker run --rm --entrypoint /bin/sh -v "${volume}:/data" \
            2fa-server:release-smoke -c 'test -s /data/2fa.sqlite'
          if grep -Eqi '"level":"ERROR"|ReleaseSmokePassword123' /tmp/2fa-release-smoke-first.log; then
            cat /tmp/2fa-release-smoke-first.log
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/354462869/2fa-server:${{ env.RELEASE_TAG }}
            ghcr.io/354462869/2fa-server:latest

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes-${{ env.RELEASE_TAG }}.md
          files: |
            2fa-extension-${{ env.RELEASE_TAG }}.zip
            2fa-source-${{ env.RELEASE_TAG }}.tar.gz
