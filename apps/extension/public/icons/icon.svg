  <!-- Lock shackle -->
  <path d="M52 62 L52 46 C52 36 60 28 70 28 C80 28 88 36 88 46 L88 48"
        fill="none" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
  <!-- Keyhole -->
  <circle cx="64" cy="78" r="6" fill="url(#bg)"/>
  <rect x="61" y="78" width="6" height="10" rx="2" fill="url(#bg)"/>
  <!-- Checkmark -->
  <polyline points="104,52 112,60 124,46"
            fill="none" stroke="#4caf50" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
